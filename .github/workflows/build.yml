name: Build Plugin

on:
  push:
    tags:
      - "v*-preview*"
      - "v*"

permissions:
  contents: write

jobs:
  preview:
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '-preview')
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build installable preview zip
        shell: bash
        run: |
          mkdir -p dist
          TAG=${GITHUB_REF_NAME}

          git archive \
            --format=zip \
            --output=dist/OctoPrint-E3S1P_ByTT_thumbnails-${TAG}.zip \
            --prefix=OctoPrint-E3S1P_ByTT_thumbnails/ \
            "$GITHUB_SHA"
          cp dist/OctoPrint-E3S1P_ByTT_thumbnails-${TAG}.zip \
            dist/OctoPrint-E3S1P_ByTT_thumbnails-preview-latest.zip

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-plugin-zip
          path: dist/*.zip

      - name: Test install
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install dist/*-${GITHUB_REF_NAME}.zip

      - name: Publish preview prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Preview ${{ github.ref_name }}
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: dist/*.zip
          body: |
            Preview build from `${{ github.sha }}` (tag: `${{ github.ref_name }}`)

  release:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-preview')
    runs-on: ubuntu-latest
    

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch for validation
        run: git fetch origin main:refs/remotes/origin/main --depth=1

      - name: Verify tag matches plugin version
        shell: bash
        run: |
          plugin_version=$(python3 - <<'EOF'
          import pathlib, re, sys
          text = pathlib.Path("setup.py").read_text()
          m = re.search(r'^plugin_version = "([^"]+)"', text, re.M)
          if not m:
              print("ERROR: plugin_version not found in setup.py")
              sys.exit(1)
          print(m.group(1))
          EOF
          )
          expected_tag="v${plugin_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match setup.py version ${plugin_version}"
            exit 1
          fi

      - name: Verify tag commit is on main
        shell: bash
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main"
            exit 1
          fi

      - name: Build installable release zip
        shell: bash
        run: |
          mkdir -p dist
          TAG=${GITHUB_REF_NAME}
          git archive \
            --format=zip \
            --output=dist/OctoPrint-E3S1P_ByTT_thumbnails-${TAG}.zip \
            --prefix=OctoPrint-E3S1P_ByTT_thumbnails/ \
            "$GITHUB_SHA"
          cp dist/OctoPrint-E3S1P_ByTT_thumbnails-${TAG}.zip \
            dist/OctoPrint-E3S1P_ByTT_thumbnails-latest.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-plugin-zip
          path: dist/*.zip

      - name: Test install
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install dist/*-${GITHUB_REF_NAME}.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: dist/*.zip
          overwrite_files: true
          generate_release_notes: true
          body: |
            Install latest:
            https://github.com/messedupryan/OctoPrint-E3S1P_ByTT_thumbnails/releases/latest/download/OctoPrint-E3S1P_ByTT_thumbnails-latest.zip

