name: Build Plugin

on:
  push:
    branches:
      - preview
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  preview:
    if: github.ref == 'refs/heads/preview'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build installable preview zip
        shell: bash
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --output=dist/OctoPrint-E3S1P_ByTT_thumbnails-preview.zip \
            --prefix=OctoPrint-E3S1P_ByTT_thumbnails/ \
            "$GITHUB_SHA"

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-plugin-zip
          path: dist/OctoPrint-E3S1P_ByTT_thumbnails-preview.zip

      - name: Move preview tag to latest preview commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f preview "$GITHUB_SHA"
          git push origin refs/tags/preview --force

      - name: Publish preview prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: Preview Build
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: dist/OctoPrint-E3S1P_ByTT_thumbnails-preview.zip
          body: |
            Rolling preview build from `${{ github.sha }}` on the `preview` branch.

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main branch for validation
        run: git fetch origin main:refs/remotes/origin/main --depth=1

      - name: Verify tag matches plugin version
        shell: bash
        run: |
          plugin_version="$(python3 -c "import pathlib, re; print(re.search(r'^plugin_version = \"([^\"]+)\"', pathlib.Path('setup.py').read_text(), re.M).group(1))")"
          expected_tag="v${plugin_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match setup.py version ${plugin_version}"
            exit 1
          fi

      - name: Verify tag commit is on main
        shell: bash
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main"
            exit 1
          fi

      - name: Build installable release zip
        shell: bash
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --output=dist/OctoPrint-E3S1P_ByTT_thumbnails.zip \
            --prefix=OctoPrint-E3S1P_ByTT_thumbnails/ \
            "$GITHUB_SHA"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-plugin-zip
          path: dist/OctoPrint-E3S1P_ByTT_thumbnails.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OctoPrint-E3S1P_ByTT_thumbnails.zip
          overwrite_files: true
          generate_release_notes: true
