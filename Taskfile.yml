# https://taskfile.dev

version: "3"

env:
  LOCALES: []  # list your included locales here, e.g. ["de", "fr"]
  TRANSLATIONS: octoprint_e3s1p_bytt_thumbnails/translations  # translations folder, do not touch


tasks:
  install:
    desc: Installs the plugin into the current venv
    cmds:
      - "pip install -e .[develop] --no-build-isolation"

  ### OctoPrint related
  server:
    desc: Runs the plugin in an OctoPrint server
    cmds:
      - "octoprint serve --port=5001 --basedir ~/.octoprint/"

  debug-server:
    desc: Runs the plugin in an OctoPrint server
    cmds:
      - "octoprint serve --port=5001 --basedir ~/.octoprint/ --debug"

  test:
    desc: Runs unit tests
    cmds:
      - .venv/bin/python -m pytest

  lint:
    desc: Runs Ruff linter
    cmds:
      - .venv/bin/python -m ruff check .

  format:
    desc: Formats Python files with Black
    cmds:
      - .venv/bin/python -m black .

  format-check:
    desc: Checks Python formatting with Black
    cmds:
      - .venv/bin/python -m black --check .

  pre-commit-install:
    desc: Installs the local pre-commit hook
    cmds:
      - .venv/bin/python -m pre_commit install


  ### Build related

  build:
    desc: Builds sdist & wheel
    cmds:
      - python -m build --sdist --wheel

  build-sdist:
    desc: Builds sdist
    cmds:
      - python -m build --sdist

  build-wheel:
    desc: Builds wheel
    cmds:
      - python -m build --wheel

  ### Translation related

  babel-new:
    desc: Create a new translation for a locale
    cmds:
      - task: babel-extract
      - |
        pybabel init --input-file=translations/messages.pot --output-dir=translations --locale="{{ .CLI_ARGS }}"

  babel-extract:
    desc: Update pot file from source
    cmds:
      - pybabel extract --mapping-file=babel.cfg --output-file=translations/messages.pot --msgid-bugs-address=i18n@octoprint.org --copyright-holder="The OctoPrint Project" .

  babel-update:
    desc: Update translation files from pot file
    cmds:
      - for:
          var: LOCALES
        cmd: pybabel update --input-file=translations/messages.pot --output-dir=translations --locale={{ .ITEM }}

  babel-refresh:
    desc: Update translation files from source
    cmds:
      - task: babel-extract
      - task: babel-update

  babel-compile:
    desc: Compile translation files
    cmds:
      - pybabel compile --directory=translations

  babel-bundle:
    desc: Bundle translations
    preconditions:
      - test -d {{ .TRANSLATIONS }}
    cmds:
      - for:
          var: LOCALES
        cmd: |
          locale="{{ .ITEM }}"
          source="translations/${locale}"
          target="{{ .TRANSLATIONS }}/${locale}"

          [ ! -d "${target}" ] || rm -r "${target}"

          echo "Copying translations for locale ${locale} from ${source} to ${target}..."
          cp -r "${source}" "${target}"
